<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW 2026 Strategy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .risk-badge { font-size: 0.65rem; letter-spacing: 0.05em; }
        .team-card { break-inside: avoid; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-3 md:p-6 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 leading-none uppercase">TW Intelligence</h1>
                <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Feb 2026 Meta • Live Feed</p>
            </div>
            <div class="text-right text-[10px] text-slate-600 uppercase">
                Optimized for Desktop & Mobile
            </div>
        </header>

        <div id="content-area" class="space-y-8">
            <div class="text-center py-10 text-slate-700 animate-pulse uppercase font-bold">Accessing Encrypted Data...</div>
        </div>
    </div>

    <script>
        async function loadCounters() {
            try {
                const res = await fetch('counters.json');
                if (!res.ok) throw new Error("File 'counters.json' not found.");
                const database = await res.json();
                const container = document.getElementById('content-area');
                container.innerHTML = ''; 

                if(database.SECTION_GL) container.appendChild(createSection("Galactic Legends", database.SECTION_GL));
                if(database.SECTION_NON_GL) container.appendChild(createSection("Non-GL Defense", database.SECTION_NON_GL));
                
            } catch (error) {
                container.innerHTML = `<div class="text-red-500 text-center p-10 border border-red-900 rounded bg-red-950/20">${error.message}</div>`;
            }
        }

        function createSection(title, data) {
            const wrapper = document.createElement('div');
            // Using a 2-column grid on medium screens and up
            let html = `<h2 class="text-xs font-black text-blue-500 mb-3 border-b border-blue-900/50 pb-1 uppercase tracking-tighter">${title}</h2>`;
            html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

            for (const key in data) {
                const entry = data[key];
                html += `
                    <div class="bg-slate-900 rounded border border-slate-800 shadow-sm team-card">
                        <div class="bg-slate-800/50 px-3 py-1.5 border-b border-slate-800 font-bold text-sm text-yellow-600">
                            ${entry.name}
                        </div>
                        <div class="p-2 space-y-2">
                `;

                entry.counters.forEach(c => {
                    const isWarning = c.team.includes("WARNING");
                    const riskColor = c.risk.includes("Low") ? "text-green-500" : (c.risk.includes("Medium") ? "text-yellow-500" : "text-red-600");
                    
                    html += `
                        <div class="${isWarning ? 'bg-red-950/30 border border-red-900' : 'bg-slate-950'} p-2 rounded-sm border border-slate-800/50">
                            <div class="flex justify-between items-start">
                                <span class="font-bold text-xs ${isWarning ? 'text-red-500' : 'text-slate-200'}">${c.team}</span>
                                <span class="risk-badge font-black uppercase px-1.5 py-0.5 bg-black/40 rounded border border-slate-800 ${riskColor}">${c.risk}</span>
                            </div>
                            <p class="text-[11px] text-slate-500 leading-tight mt-1">${c.note}</p>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            html += `</div>`;
            wrapper.innerHTML = html;
            return wrapper;
        }

        loadCounters();
    </script>
</body>
</html>
