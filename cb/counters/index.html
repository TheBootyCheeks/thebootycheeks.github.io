<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW 2026 Counter Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10 border-b border-gray-700 pb-6">
            <h1 class="text-4xl font-extrabold text-yellow-500 mb-2 tracking-tight">TW DEFENSE COUNTERS</h1>
            <p class="text-gray-400">Validated for February 2026 Meta - Territory War Focus</p>
        </header>

        <div id="content-area" class="space-y-10">
            </div>
    </div>

    <script>
        async function loadCounters() {
            const res = await fetch('./counters.json');
            const database = await res.json();
            const container = document.getElementById('content-area');

            // Render GLs first, then Non-GLs
            container.appendChild(createSection("Galactic Legend Targets", database.SECTION_GL));
            container.appendChild(createSection("Top 20 Non-GL Defense Walls", database.SECTION_NON_GL));
        }

        function createSection(title, data) {
            const section = document.createElement('div');
            let html = `<h2 class="text-3xl font-bold text-blue-400 mb-6 uppercase tracking-widest">${title}</h2>`;
            html += `<div class="grid gap-6">`;

            for (const key in data) {
                const entry = data[key];
                html += `
                    <div class="bg-gray-800 rounded-xl overflow-hidden shadow-lg border border-gray-700">
                        <div class="bg-gray-700 px-6 py-3 border-b border-gray-600 font-bold text-xl uppercase">
                            ${entry.name}
                        </div>
                        <div class="p-6 space-y-4">
                `;

                entry.counters.forEach(c => {
                    const isWarning = c.team.includes("WARNING");
                    const riskColor = c.risk.includes("Low") ? "text-green-400" : (c.risk.includes("Medium") ? "text-yellow-400" : "text-red-500");
                    
                    html += `
                        <div class="${isWarning ? 'bg-red-950/50 border-2 border-red-600' : 'bg-gray-900'} p-4 rounded-lg">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-lg font-bold ${isWarning ? 'text-red-500' : 'text-white'}">${c.team}</span>
                                <span class="text-xs font-black uppercase px-2 py-1 bg-black/40 rounded ${riskColor}">${c.risk} RISK</span>
                            </div>
                            <p class="text-sm text-gray-400 leading-relaxed">${c.note}</p>
                        </div>
                    `;
                });

                html += `</div></div>`;
            }

            html += `</div>`;
            section.innerHTML = html;
            return section;
        }

        loadCounters();
    </script>
</body>
</html>
