<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWGOH Territory Counters</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --primary: #00d4ff;
            --secondary: #bb86fc;
            --text: #e0e0e0;
            --soft: #ffa726;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .controls {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 15px;
            z-index: 100;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #searchBar {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            font-size: 16px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        .defense-card {
            background: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            border-left: 5px solid var(--primary);
            transition: transform 0.2s;
        }

        .defense-header {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .counter-list {
            padding: 15px;
            display: block;
        }

        .counter-item {
            padding: 8px 0;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
        }

        .counter-item:last-child { border-bottom: none; }

        .soft-counter {
            color: var(--soft);
            font-size: 0.85rem;
            font-style: italic;
            margin-left: 10px;
        }

        .hard-counter {
            color: #4caf50;
            margin-right: 8px;
        }

        .note {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 4px;
            display: block;
        }

        @media (max-width: 600px) {
            .controls { width: 90%; }
        }
    </style>
</head>
<body>

    <h1>Guild Counters</h1>

    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search defensive team (e.g. Leia)..." onkeyup="filterTeams()">
    </div>

    <div class="container" id="counterContainer">
        </div>

<script>
    const data = [
        { team: "Jedi Master Kenobi", counters: [
            { name: "JMK Mirror", soft: false },
            { name: "Reva", soft: false },
            { name: "Leia", soft: false },
            { name: "JML w. JKR", soft: false, note: "Mark CAT" },
            { name: "Jabba", soft: true },
            { name: "SEE, Armorer, Wat, Daka, Zombie", soft: true, note: "Sub Sith Empire Trooper" },
            { name: "Dark Side Mauldalorians", soft: true }
        ]},
        { team: "Jabba the Hutt", counters: [
            { name: "JMK", soft: false },
            { name: "Bane", soft: false },
            { name: "LV", soft: false, note: "First Special on Krrs to apply buff immunity" },
            { name: "Reva", soft: false },
            { name: "oDTMG", soft: false },
            { name: "JML w JKC/JKR", soft: true, note: "Mark Leia" },
            { name: "Aphra with DCs", soft: false, note: "Needs B2 or IPD to remove buffs" }
        ]},
        { team: "Jedi Master Luke", counters: [
            { name: "SEE w. Wat or Garbage Sith", soft: false },
            { name: "JMK", soft: false },
            { name: "Leia", soft: false },
            { name: "JML Mirror", soft: false },
            { name: "Reva", soft: false },
            { name: "LV", soft: false },
            { name: "Malgus", soft: true },
            { name: "Imp Troopers", soft: true, note: "Save mass assist till JML loses taunt" }
        ]},
        { team: "Leia Organa", counters: [
            { name: "Leia Mirror", soft: false },
            { name: "Bane", soft: false },
            { name: "JMK", soft: false },
            { name: "JML with JKC/JKR", soft: true }
        ]},
        { team: "Lord Vader", counters: [
            { name: "JMK", soft: false },
            { name: "Bane", soft: false },
            { name: "JML", soft: false },
            { name: "Leia", soft: false },
            { name: "Bo Katan", soft: false },
            { name: "Gungans", soft: false },
            { name: "Reva", soft: false },
            { name: "SLKR", soft: true },
            { name: "Fennec, Bossk, Greef, BAM, Mando", soft: true }
        ]},
        { team: "Rey", counters: [
            { name: "JML", soft: false },
            { name: "JMK", soft: false },
            { name: "SEE", soft: false },
            { name: "LV", soft: false },
            { name: "Rey Mirror", soft: false },
            { name: "SLKR", soft: false },
            { name: "Cere, Malicos, KRU, oCal, oAhsoka", soft: true },
            { name: "JKR, JKL, bastilla, Old Ben, Hoda", soft: true }
        ]},
        { team: "Third Sister (Reva)", counters: [
            { name: "Malgus", soft: false },
            { name: "Bane", soft: false },
            { name: "JMK with padme", soft: false },
            { name: "Phoenix w. CRex", soft: false },
            { name: "Raddus", soft: true },
            { name: "CLS", soft: true, note: "All in on GI" }
        ]},
        { team: "oDroideka", counters: [
            { name: "JKR", soft: false },
            { name: "GAS", soft: false },
            { name: "NS w. Merrin", soft: false },
            { name: "Raddus", soft: true },
            { name: "Sith Empire", soft: false }
        ]},
        { team: "Starkiller w. oJuhani", counters: [
            { name: "oAhsoka", soft: false },
            { name: "SEE", soft: false },
            { name: "Reva", soft: false },
            { name: "UFU w Malicos", soft: false },
            { name: "oPhasma w. Hux/Sith Trooper/FOST", soft: false }
        ]},
        { team: "Starkiller", counters: [
            { name: "CLS", soft: false },
            { name: "Tuskens", soft: true }
        ]},
        { team: "oPoggle", counters: [
            { name: "Imp Troopers", soft: false },
            { name: "Raddus", soft: false },
            { name: "Palp w MJ", soft: false },
            { name: "oAhsoka", soft: false },
            { name: "Sith Trio, Nest, Talon", soft: true }
        ]},
        { team: "Kelleran Beq", counters: [
            { name: "oPhasma", soft: false },
            { name: "Traya w. Talon", soft: true },
            { name: "SEE", soft: false }
        ]},
        { team: "Dark Trooper Moff Gideon", counters: [
            { name: "Raddus", soft: true },
            { name: "Bo Katan", soft: false }
        ]},
        { team: "Queen Amidala", counters: [
            { name: "Bane w/ Sith Assassin", soft: false },
            { name: "JMK w/ Padme", soft: false },
            { name: "GAS", soft: false },
            { name: "JML w/ JCK", soft: false },
            { name: "EP, SK, MJ", soft: false },
            { name: "Inquisitors (Reva L)", soft: false }
        ]},
        { team: "Gungans", counters: [
            { name: "JML", soft: false },
            { name: "Bo", soft: false },
            { name: "Phoenix", soft: false },
            { name: "Shaak Clones", soft: false },
            { name: "Cere UwU w/ CK + Fulcrum omi", soft: false }
        ]}
    ];

    function render() {
        const container = document.getElementById('counterContainer');
        container.innerHTML = data.map(item => `
            <div class="defense-card">
                <div class="defense-header" onclick="toggle(this)">
                    ${item.team} <span>+</span>
                </div>
                <div class="counter-list">
                    ${item.counters.map(c => `
                        <div class="counter-item">
                            <div>
                                <span class="hard-counter">⚔</span>
                                <strong>${c.name}</strong>
                                ${c.soft ? '<span class="soft-counter">(Soft Counter)</span>' : ''}
                                ${c.note ? `<span class="note">${c.note}</span>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function toggle(el) {
        const list = el.nextElementSibling;
        list.style.display = list.style.display === 'none' ? 'block' : 'none';
        el.querySelector('span').innerText = list.style.display === 'none' ? '+' : '-';
    }

    function filterTeams() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.getElementsByClassName('defense-card');
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].innerText.toLowerCase();
            cards[i].style.display = title.includes(input) ? "block" : "none";
        }
    }

    render();
</script>
</body>
</html>
