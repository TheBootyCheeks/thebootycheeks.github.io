<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWGOH Territory Counters</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f1f5f9;
            --soft: #fbbf24;
            --hard: #4ade80;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.5rem; text-transform: uppercase; }

        .controls {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 10px 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #searchBar {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        /* Grid Layout */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }

        .defense-card {
            background: var(--card-bg);
            border-radius: 8px;
            border-top: 4px solid var(--accent);
            padding: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .defense-title {
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 8px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .counter-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 4px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .counter-name { flex: 1; }
        
        .soft-tag {
            background: #78350f;
            color: var(--soft);
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            white-space: nowrap;
        }

        .note {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            font-style: italic;
        }

        @media (max-width: 400px) {
            .counter-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Guild Territory Counters</h1>
</header>

<div class="controls">
    <input type="text" id="searchBar" placeholder="Search team or counter..." onkeyup="filter()">
</div>

<div class="counter-grid" id="grid">
    </div>

<script>
const data = [
    { team: "Jedi Master Kenobi", counters: [
        { n: "JMK Mirror", s: 0 }, { n: "Reva", s: 0 }, { n: "Leia", s: 0 },
        { n: "JML w. JKR", s: 0, note: "Mark CAT" },
        { n: "Jabba", s: 1 }, { n: "SEE+Armorer/Wat/Daka/Zombie", s: 1 }, { n: "DS Mauldalorians", s: 1 }
    ]},
    { team: "Jabba the Hutt", counters: [
        { n: "JMK / Bane / Reva / oDTMG", s: 0 },
        { n: "LV", s: 0, note: "Buff immunity on Krrs first" },
        { n: "JML w JKC/JKR", s: 1, note: "Mark Leia" },
        { n: "Aphra (w/ DCs)", s: 0, note: "Needs B2/IPD for buffs" }
    ]},
    { team: "Jedi Master Luke", counters: [
        { n: "SEE (Wat/Garbage Sith)", s: 0 }, { n: "JMK / Leia / LV / Reva", s: 0 },
        { n: "Malgus", s: 1 }, { n: "Imp Troopers", s: 1, note: "Mass assist after JML taunt ends" }
    ]},
    { team: "Leia Organa", counters: [
        { n: "Leia Mirror / Bane / JMK", s: 0 },
        { n: "JML with JKC/JKR", s: 1 }
    ]},
    { team: "Lord Vader", counters: [
        { n: "JMK / Bane / JML / Leia", s: 0 }, { n: "Bo Katan / Gungans / Reva", s: 0 },
        { n: "SLKR", s: 1 }, { n: "Fennec BH", s: 1, note: "Bossk, Greef, BAM, Mando" }
    ]},
    { team: "Rey", counters: [
        { n: "JML / JMK / SEE / LV / SLKR", s: 0 },
        { n: "Cere/Malicos/KRU/oCal", s: 1 }, { n: "JKR/JKL/Bast/Ben/Hoda", s: 1 }
    ]},
    { team: "Third Sister (Reva)", counters: [
        { n: "Malgus / Bane / JMK+Padme", s: 0 }, { n: "Phoenix w. CRex", s: 0 },
        { n: "Raddus", s: 1 }, { n: "CLS", s: 1, note: "All in on Grand Inquisitor" }
    ]},
    { team: "Queen Amidala", counters: [
        { n: "Bane w/ Sith Assassin", s: 0 }, { n: "JMK w/ Padme", s: 0 }, { n: "GAS / JML w/ JCK", s: 0 },
        { n: "EP / SK / MJ", s: 0 }, { n: "Reva Inquisitors", s: 0 }
    ]},
    { team: "Gungans", counters: [
        { n: "JML / Bo Katan / Phoenix", s: 0 }, { n: "Shaak Clones", s: 0 },
        { n: "Cere w/ CK + Fulcrum", s: 0 }
    ]},
    { team: "oDroideka", counters: [
        { n: "JKR / GAS / NS+Merrin", s: 0 }, { n: "Sith Empire", s: 0 }, { n: "Raddus", s: 1 }
    ]},
    { team: "Starkiller (oJuhani)", counters: [
        { n: "oAhsoka / SEE / Reva", s: 0 }, { n: "UFU w Malicos", s: 0 }, { n: "oPhasma FO", s: 0 }
    ]},
    { team: "oPoggle", counters: [
        { n: "Imp Troopers / Raddus", s: 0 }, { n: "Palp+MJ / oAhsoka", s: 0 }, { n: "Sith Trio+Nest", s: 1 }
    ]}
];

function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = data.map(item => `
        <div class="defense-card">
            <div class="defense-title">${item.team}</div>
            ${item.counters.map(c => `
                <div class="counter-row">
                    <div class="counter-name">
                        ${c.n}
                        ${c.note ? `<span class="note">${c.note}</span>` : ''}
                    </div>
                    ${c.s ? '<span class="soft-tag">SOFT</span>' : ''}
                </div>
            `).join('')}
        </div>
    `).join('');
}

function filter() {
    let val = document.getElementById('searchBar').value.toLowerCase();
    let cards = document.getElementsByClassName('defense-card');
    Array.from(cards).forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
}

render();
</script>

</body>
</html>
